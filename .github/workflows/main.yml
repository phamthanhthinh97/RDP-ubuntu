name: Docker-Ubuntu-Desktop-Fixed

on:
  workflow_dispatch:

jobs:
  run-desktop-container:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Start Ubuntu Desktop Docker Container
        run: |
          # Cấu hình Chrome trong Docker tự động ăn theo mạng Proxy của WARP ở máy host (172.17.0.1:40000)
          # Thêm biến --shm-size để không bị sập tab khi load video
          docker run -d \
            --name ubuntu-desktop \
            --restart always \
            -p 80:80 \
            -p 5900:5900 \
            --shm-size=2g \
            -e CHROMIUM_FLAGS="--proxy-server=socks5://172.17.0.1:40000" \
            dorowu/ubuntu-desktop-lxde-vnc

          sleep 5
          docker ps

      - name: Install and Connect Cloudflare WARP (Proxy Mode)
        run: |
          # 1. Cài đặt kho và gói Cloudflare WARP
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          
          # 2. Khởi động dịch vụ hệ thống
          sudo systemctl enable warp-svc
          sudo systemctl start warp-svc
          sleep 3
          
          # 3. ĐĂNG KÝ VÀ CHUYỂN SANG CHẾ ĐỘ PROXY (QUAN TRỌNG)
          warp-cli --accept-tos registration new
          
          # Chuyển từ chế độ tạo Card mạng ảo sang chế độ Proxy cục bộ để không xung đột với Tailscale
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5
          
          # 4. Kiểm tra xem Proxy WARP hoạt động chưa bằng cách test qua cổng 40000
          echo "Kiểm tra IP thông qua Proxy WARP (Cloudflare):"
          curl -x socks5://127.0.0.1:40000 -s ifconfig.me || echo "Chưa kết nối được proxy"
          echo ""
          
          echo "Kiểm tra IP gốc của GitHub (Vẫn giữ nguyên để Tailscale chạy):"
          curl -s ifconfig.me

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          # Giờ đây Tailscale kết nối hoàn toàn bình thường, không lo bị nghẽn mạng nữa
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-ubuntu-docker-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
              TS_IP=$(tailscale ip -4)
              sleep 5
              RETRIES=$((RETRIES+1))
          done
          
          if [ -z "$TS_IP" ]; then
              echo "Không lấy được IP Tailscale. Thoát."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      
      - name: Verify Web GUI Accessibility
        run: |
          nc -zv localhost 80 || exit 1
          echo "Kết nối nội bộ đến cổng Web GUI thành công!"

      - name: Maintain Connection & Output Link
        run: |
          echo -e "\n=== UBUNTU DESKTOP DOCKER ACCESS ==="
          echo "Cách 1: Mở trình duyệt và truy cập đường dẫn sau:"
          echo "👉 http://$TAILSCALE_IP"
          echo ""
          echo "Cách 2: Sử dụng phần mềm VNC Viewer kết nối tới:"
          echo "👉 $TAILSCALE_IP:5900"
          echo "=====================================\n"
          
          while true; do
              echo "[$(date)] Toàn bộ hệ thống chạy mượt mà: Tailscale kết nối ổn định + Chrome trong Docker lướt YouTube qua WARP Proxy!"
              sleep 300
          done
