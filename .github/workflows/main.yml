name: Docker-Ubuntu-Desktop

on:
  workflow_dispatch:

jobs:
  run-desktop-container:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Start Ubuntu Desktop Docker Container
        run: |
          # Khởi chạy container với cấu hình bộ nhớ đệm tăng lên để tránh sập tab Chrome khi xem video
          docker run -d \
            --name ubuntu-desktop \
            --restart always \
            -p 80:80 \
            -p 5900:5900 \
            --shm-size=2g \
            dorowu/ubuntu-desktop-lxde-vnc

          sleep 5
          docker ps

      # =========================================================================
      # VỊ TRÍ DÁN: ĐẶT NGAY TẠI ĐÂY (SAU KHI CHẠY DOCKER & TRƯỚC KHI CÀI TAILSCALE)
      # =========================================================================
      - name: Install and Connect Cloudflare WARP
        run: |
          # 1. Cài đặt kho lưu trữ của Cloudflare
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Cài đặt warp-cli
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          
          # 3. FIX LỖI KẾT NỐI: Ép dịch vụ warp-svc khởi động thủ công bằng systemctl
          echo "Đang kích hoạt và khởi động dịch vụ WARP..."
          sudo systemctl enable warp-svc
          sudo systemctl start warp-svc
          
          # Chờ 3 giây để dịch vụ khởi động hoàn toàn ổn định trong nền
          sleep 3
          
          # Kiểm tra trạng thái xem dịch vụ đã chạy chưa (Active: active (running))
          sudo systemctl status warp-svc --no-pager || true
          
          # 4. Đăng ký và kết nối mạng WARP
          echo "Đang thiết lập kết nối WARP..."
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          
          # Chờ thêm vài giây để WARP thiết lập đường hầm VPN thành công
          sleep 5
          
          # 5. Kiểm tra kết nối và hiển thị IP mới
          echo "IP hiện tại của GitHub Runner sau khi bật WARP thành công:"
          curl -s ifconfig.me || echo "Không lấy được IP công khai, nhưng kiểm tra status:"
          echo ""
          warp-cli --accept-tos status

      # =========================================================================
      # CÁC BƯỚC CÒN LẠI GIỮ NGUYÊN
      # =========================================================================
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-ubuntu-docker-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
              TS_IP=$(tailscale ip -4)
              sleep 5
              RETRIES=$((RETRIES+1))
          done
          
          if [ -z "$TS_IP" ]; then
              echo "Không lấy được IP Tailscale. Thoát."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      
      - name: Verify Web GUI Accessibility
        run: |
          nc -zv localhost 80 || exit 1
          echo "Kết nối nội bộ đến cổng Web GUI thành công!"

      - name: Maintain Connection & Output Link
        run: |
          echo -e "\n=== UBUNTU DESKTOP DOCKER ACCESS ==="
          echo "Cách 1: Mở trình duyệt và truy cập đường dẫn sau:"
          echo "👉 http://$TAILSCALE_IP"
          echo ""
          echo "Cách 2: Sử dụng phần mềm VNC Viewer kết nối tới:"
          echo "👉 $TAILSCALE_IP:5900"
          echo "=====================================\n"
          
          while true; do
              echo "[$(date)] Docker Desktop Active - YouTube đã sẵn sàng qua Cloudflare WARP..."
              sleep 300
          done
