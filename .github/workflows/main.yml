name: Docker-Ubuntu-Desktop

on:
  workflow_dispatch:

jobs:
  run-desktop-container:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Start Ubuntu Desktop Docker Container
        run: |
          # Chạy container ubuntu-desktop ở chế độ nền (detached)
          # Map port 80 để vào bằng trình duyệt, và port 5900 cho VNC client nếu cần
          docker run -d \
            --name ubuntu-desktop \
            --restart always \
            -p 80:80 \
            -p 5900:5900 \
            -v /dev/shm:/dev/shm \
            dorowu/ubuntu-desktop-lxde-vnc

          # Chờ vài giây để container khởi động hoàn toàn
          sleep 5
          docker ps

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-ubuntu-docker-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
              TS_IP=$(tailscale ip -4)
              sleep 5
              RETRIES=$((RETRIES+1))
          done
          
          if [ -z "$TS_IP" ]; then
              echo "Không lấy được IP Tailscale. Thoát."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      
      - name: Verify Web GUI Accessibility
        run: |
          # Kiểm tra xem port 80 (HTTP) đã sẵn sàng chưa
          nc -zv localhost 80 || exit 1
          echo "Kết nối nội bộ đến cổng Web GUI thành công!"

      - name: Maintain Connection & Output Link
        run: |
          echo -e "\n=== UBUNTU DESKTOP DOCKER ACCESS ==="
          echo "Cách 1: Mở trình duyệt và truy cập đường dẫn sau:"
          echo "👉 http://$TAILSCALE_IP"
          echo ""
          echo "Cách 2: Sử dụng phần mềm VNC Viewer kết nối tới:"
          echo "👉 $TAILSCALE_IP:5900"
          echo "=====================================\n"
          
          # Vòng lặp duy trì workflow
          while true; do
              echo "[$(date)] Docker Desktop Active - Đang chạy an toàn qua Tailscale..."
              sleep 300
          done
